name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: khalidsaifullah-ks
          outputs: dist/snake.svg

      - name: Push Snake
        uses: EndBug/add-and-commit@v7
        with:
          add: "dist/snake.svg"
          message: "Updated snake animation"
          default_author: github_actions
          push: true
